  setup_mode: false
  id: esp32_touch_1
  measurement_duration: 0.25ms  # Much lower than the 8ms default
  sleep_duration: 0.5ms

binary_sensor:
  - platform: esp32_touch #touch Pad 'Touch Pad on ESP32' (T8): value=88669, benchmark=4194303, difference=-4105634 (set threshold < -4105634 to detect touch)
    name: "Touch Pad on ESP32"
    id: esp32_touch_pad
    pin: GPIO8
    threshold: 80000 #1200
    on_press:
      then:
        - lvgl.page.next:

i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO5 #WS 
    i2s_bclk_pin: GPIO4 #SCK

microphone:
  - platform: i2s_audio
    adc_type: external
    id: mic_i2s
    channel: left
    bits_per_sample: 32bit
    i2s_audio_id: i2s_in  
    i2s_din_pin: GPIO39 #SD Pin INMP441 Microphone    
#    bits_per_channel: 16bit
    sample_rate: 16000
    correct_dc_offset: true       
    pdm: false
    use_apll: true

