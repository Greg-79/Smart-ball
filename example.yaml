light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
    gamma_correct: 1

  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: GRB
    pin: 
      number: GPIO48
    num_leds: 1
#    rmt_channel: 4
    id: status_led
    name: "Status_led"
    effects:
      - random:
      - flicker:
      - addressable_rainbow:
      - strobe:
      - flicker:
          name: Broad Flicker
          alpha: 95%
          intensity: 10%
      - addressable_rainbow:
          name: Fast Rainbow
          speed: 50
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 50%
      - pulse:
          name: "Low Pulse"
          transition_length: 1s
          update_interval: 1s
          min_brightness: 0%
          max_brightness: 50%

output:
  - platform: ledc
    pin: 
      number: GPIO6
    id: backlight_pwm
    frequency: 1000Hz

    
