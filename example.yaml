substitutions:
  ha:       "\U0000e935" #\U000F07D0" # home assistant F07D0
  no_ha:    "\U000F1A47"
  wifi_25:  "\U0000e931" # wifi signal from 25% to 1%  F091F
  wifi_50:  "\U0000e932" # wifi signal from 50% to 25% F0922
  wifi_75:  "\U0000e933" # wifi signal from 75% to 50% F0925
  wifi_100: "\U0000e934" # wifi signal from 100% to 75% or disable F0928
  low_wifi: "\U000F0920"
  no_wifi:  "\U000F092B"
  humidity_icon: "\U0000e938"
  temperature_icon:  "\U0000e939"
  eco_icon: "\U000F032A"
  noise_level: 
  lx_threshold_min: "10" # minimum lux
  lx_threshold_max: "100" # maximum lus
  minimum_backlight: "10" # percentage

esphome:
  name: s3-co2
  friendly_name: S3-CO2
  build_path: s3
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
  on_boot:
    priority: 800.0
    then:
      - delay: 5s
#      - lvgl.widget.hide: boot_screen
      - light.turn_on:
          id: status_led
          blue: 0%
          red: 0%
          green: 60%
          brightness: 60%
          effect: low pulse

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 4MB
#  variant: ESP32S3
  framework:
    type: esp-idf
#    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
# Enable logging
#logger:
#  level: none
#  logs:
#    touch: DEBUG
#    display: DEBUG

# Enable Home Assistant API
api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.label.update: 
              id: ha_status
              text_color: 0x0000ff
   
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.label.update: 
              id: ha_status
              text_color: 0x444444

  encryption:
    key: "sTo/UA8mI/NFcH21tu00sY8HMbVTZ8Zs8Ibichjq0+0="

#ota:
#  - platform: esphome
#    password: "da72125eeb0023ba66342e3cca70259a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "S3-Co2 Fallback Hotspot"
    password: "fUhMpR1yE0BP"

captive_portal:

psram:
  mode: octal
  speed: 80MHZ

i2c:
  sda: GPIO2
  scl: GPIO1
  scan: true
  id: bus_a

# SCD41 sensor ‚Äď measures CO‚āā, temperature, humidity

text_sensor:
# Reports WiFi name
  - platform: wifi_info
    ssid:
      name: "WiFi"
      id: wifi_name
      on_value:
        then:
          - lvgl.label.update:
              id: wifi_name_label
              text: !lambda 'return x.c_str();'

# Reports IP
  - platform: wifi_info
    ip_address:
      name: "IP"
      id: ip_
      on_value:
        then:
          - lvgl.label.update:
              id: ip_label
              text: !lambda 'return x.c_str();'

sensor:
  - platform: internal_temperature
    accuracy_decimals: 2
    name: "core_temperature"
    id: core_temperature
    update_interval: 60s
    unit_of_measurement: ¬įC
    on_value:
      then:
        - lvgl.label.update:
            id: core_temperature_label
            text:
              format: "%.1f ¬įC"
              args: [ 'x' ]

  - platform: uptime
    name: "Uptime"
    id: climat_upt
    update_interval: 60s
    on_value:
      then:

  - platform: wifi_signal
    id: wifi_signal_percent
    update_interval: 30s
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    on_value: 
      then:
        - lvgl.label.update:
            id: wifi_status
            text_color: !lambda |-
              if (id(wifi_signal_percent).state > 0) {
              return lv_color_hex(0x00FF00);
              }
              return lv_color_hex(0x333333);
            text: !lambda |-
              if (id(wifi_signal_percent).state > 0 && id(wifi_signal_percent).state < 26) {
              return "${wifi_25}";
              } else if (id(wifi_signal_percent).state > 25 && id(wifi_signal_percent).state < 51) {
              return "${wifi_50}";
              } else if (id(wifi_signal_percent).state > 50 && id(wifi_signal_percent).state < 76) {
              return "${wifi_75}";
              } else if (id(wifi_signal_percent).state > 75) {
              return "${wifi_100}";
              }
              return "${wifi_100}";
        - lvgl.label.update:
            id: wifi_level_label
            text:
              format: "%.0f dB"
              args: [ 'x' ]
  - platform: scd4x
    id: scd41
    co2:
      name: "CO2"
      accuracy_decimals: 0
      unit_of_measurement: "ppm"
      id: scd41co2
      on_value:
        then:
          - lvgl.arc.update:
              id: arc_co2
              value: !lambda return x;
          - lvgl.label.update:
              id: co2_label
              text:
                format: "%.0f"
                args: [ 'x' ]
              text_color: !lambda |-
                if (id(scd41co2).state > 0 && id(scd41co2).state <= 400) {
                return lv_color_hex(0x999999);
                } else if (id(scd41co2).state > 400 && id(scd41co2).state <= 600) {
                return lv_color_hex(0x00cc00);
                } else if (id(scd41co2).state > 600 && id(scd41co2).state <= 800) {
                return lv_color_hex(0xffff00);
                } else if (id(scd41co2).state > 800 && id(scd41co2).state <= 1000) {
                return lv_color_hex(0xffa200);
                } else if (id(scd41co2).state > 1000 && id(scd41co2).state <= 1200) {
                return lv_color_hex(0xe65c00);
                }else if (id(scd41co2).state > 1200) {
                return lv_color_hex(0xbb0000);
                }                      

    temperature:
      name: "Temperature"
      accuracy_decimals: 1
      id: scd41_temp
      unit_of_measurement: "¬įC"
#      filters:
#        - filter_out: 0.0
#        - median:
#            window_size: 3
#            send_every: 3
#            send_first_at: 1
      filters:
        - calibrate_linear:
            - 0.0 -> 0.0
            - 30.8 -> 25.0
#            - 30.5 -> 23.2
      on_value:
        then:
          - lvgl.arc.update:
              id: arc_temp
              value: !lambda return x;
          - lvgl.label.update:
              id: temp_label
              text:
                format: "%.1f"
                args: [ 'x' ]

    humidity:
      name: "Humidity"
      accuracy_decimals: 1
      unit_of_measurement: "%"
      id: scd41_humi
      on_value:
        then:
          - lvgl.label.update:
              id: humi_label
              text:
                format: "%.1f"
                args: [ 'x' ]
      filters:
      - filter_out: 0.0
      - median:
          window_size: 3
          send_every: 3
          send_first_at: 1
    update_interval: 30s

  - platform: sound_level
    microphone: mic_i2s
    passive: false
    measurement_duration: 150ms
    
    peak:
      name: "Peak Loudness (dBFS)"
      id: LAeq_1min
      internal: true
      filters:
        - calibrate_linear:
            - -73.0 -> 38.0
            - -52.0 -> 64.0
            - -57.0 -> 57.6
            - -43.5 -> 85.0
            - -30.0 -> 91.4
            - -16.4 -> 100.7
      on_value:
        then:
          - lvgl.arc.update:
              id: LApeak
              value: !lambda return x;
          - lvgl.bar.update:
              id: eq_level_1
              value: !lambda return id(LAeq_1min).state;
          - lvgl.bar.update:
              id: eq_level_3
              value: !lambda return id(LAeq_1min).state;
          - lvgl.bar.update:
              id: eq_level_5
              value: !lambda return id(LAeq_1min).state;
    rms:
      name: "Average Loudness (dBFS)"
      id: rms_level
      internal: True
      filters:
        - calibrate_linear:
            - -73.0 -> 38.0
            - -52.0 -> 64.0
            - -57.0 -> 57.6
            - -43.5 -> 85.0
            - -30.0 -> 91.4
            - -16.4 -> 100.7
      on_value:
        then:
          - lvgl.bar.update:
              id: eq_level_2
              value: !lambda return id(rms_level).state;
          - lvgl.bar.update:
              id: eq_level_4
              value: !lambda return id(rms_level).state;
          - lvgl.bar.update:
              id: eq_level_6
              value: !lambda return id(rms_level).state;

          - lvgl.arc.update:
              id: arc_noise
              value: !lambda return x;
          - lvgl.label.update:
              id: noise_label
              text:
                format: "%.1f"
                args: [ 'x' ]
          - lvgl.label.update:
              id: noise_level_label
              text_color: !lambda |-
                if (id(LAeq_1min).state > 0 && id(LAeq_1min).state < 30) {
                return lv_color_hex(0x00cc00);
                } else if (id(LAeq_1min).state > 30 && id(LAeq_1min).state < 70) {
                return lv_color_hex(0x006600);
                } else if (id(LAeq_1min).state > 70 && id(LAeq_1min).state < 90) {
                return lv_color_hex(0xffff00);
                } else if (id(LAeq_1min).state > 90 && id(LAeq_1min).state < 130) {
                return lv_color_hex(0xff5c00);
                }else if (id(LAeq_1min).state > 130) {
                return lv_color_hex(0x880000);
                }                      
              text: !lambda |-
                if (id(LAeq_1min).state > 0 && id(LAeq_1min).state < 30) {
                return "–Ę–ł—Ö–ĺ";
                } else if (id(LAeq_1min).state > 30 && id(LAeq_1min).state < 70) {
                return "–Ě–ĺ—Ä–ľ–į";
                } else if (id(LAeq_1min).state > 70 && id(LAeq_1min).state < 90) {
                return "–®—É–ľ–Ĺ–ĺ";
                } else if (id(LAeq_1min).state > 90 && id(LAeq_1min).state < 130) {
                return "–ě—á–Ķ–Ĺ—Ć —ą—É–ľ–Ĺ–ĺ";
                } else if (id(LAeq_1min).state > 130) {
                return "–ě–Ņ–į—Ā–Ĺ–ĺ";
                }

  - platform: tsl2561
    name: "TSL2561 Ambient Light"
    id: level_light
    address: 0x39
    update_interval: 1s
    filters:
      - calibrate_linear: #Calibrated using the MOBIPLUS WT81B
          - 0.0 -> 0.0
          - 4.0 -> 11.8
          - 7.3 -> 34.5
          - 10.3 -> 81.2
          - 129.3 -> 190.5

    on_value:
      then:
        - light.turn_on:
            id: backlight
            brightness: !lambda |-
              return id(level_light).state / 130.0;
        - lvgl.label.update:
            id: lux_level
            text:
              format: "%.1f lux"
              args: [ 'x' ]

#  - platform: template
#    name: "Raw touch value"
#    lambda: |-
#        return id(esp32_touch_pad).get_value();
#    update_interval: 3s


# Manually set a reference CO‚āā value for calibration
number:
  - platform: template
    name: "CO‚āā Calibration Reference"
    id: co2_calibration_value
    optimistic: true
    min_value: 400
    max_value: 2000
    step: 1
    initial_value: 400
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"

# Buttons to trigger forced calibration or factory reset
button:
  - platform: template
    name: "Calibrate CO‚āā Sensor"
    icon: "mdi:calibration"
    on_press:
      then:
        - lambda: |-
            id(scd41).perform_forced_calibration(id(co2_calibration_value).state);
#        - logger.log: 
#            format: "Forced calibration with reference %d ppm"
#            args: ["int(id(co2_calibration_value).state)"]

  - platform: template
    name: "CO‚āā Sensor Factory Reset"
    icon: "mdi:restore"
    id: factory_reset_button
    on_press:
      then:
        - scd4x.factory_reset: scd41
#        - logger.log: "SCD41 sensor factory reset initiated"

# Optional: Switch for enabling/disabling auto calibration

  - platform: template
    name: "Next"
    id: next_page
    on_press:
      then:
        - lvgl.page.next:
            animation: FADE_OUT
            time: 500ms

switch:
  - platform: template
    name: "CO‚āā_Auto_Calibration"
    id: co2_auto_calibration
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:calibration"
    on_turn_on:
      - lambda: 'id(scd41).set_automatic_self_calibration(true);'
#      - logger.log: "Enabled automatic self-calibration"
    on_turn_off:
      - lambda: 'id(scd41).set_automatic_self_calibration(false);'
#      - logger.log: "Disabled automatic self-calibration"

