  - source: github://pr#10392
    components: [mipi_spi]
    refresh: 1h

spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO13
  data_pins: [GPIO12, GPIO11, GPIO10, GPIO9]

display:
#1,5" ST77916
  - platform: mipi_spi
    id: my_display
    bus_mode: quad
    model: CUSTOM
    rotation: 0
