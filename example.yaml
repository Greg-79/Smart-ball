lvgl:
  displays:
    - my_display
  bg_color: 0x000000
  scrollable: false
  buffer_size: 25%  # –ú–ł–Ĺ–ł–ľ—É–ľ –ī–Ľ—Ź LVGL
  page_wrap: true
  pages:
    - id: power_page
      height: 100%
      width: 100%
      align: CENTER
      bg_color: 0x000000
      border_width: 0
      border_opa: 0%
      pad_all: 0
      widgets:
        # CO2 state
        - arc: 
            align: center
            height: 345
            width: 345
            arc_width: 10
            id: arc_co2
            #value: 75
            min_value: 0
            max_value: 2000
            adjustable: true
            arc_opa: 95%
            arc_color: 0x333333
            arc_rounded: true
            indicator:
              arc_color: 0xff2222
              arc_width: 6
              arc_opa: 80%
            knob:
              border_color: 0xff2222
              border_width: 4
              bg_color: 0xff2222
              #bg_opa: COVER

        # Temperature state
        - arc: 
            align: center
            height: 310
            width: 310
            arc_width: 10
            id: arc_temp
            #value: 75
            min_value: 0
            max_value: 35
            adjustable: true
            arc_opa: 95%
            arc_color: 0x333333
            arc_rounded: true
            indicator:
              arc_color: 0x22ff22
              arc_width: 6
              arc_opa: 80%
            knob:
              border_color: 0x22ff22
              border_width: 4
              bg_color: 0x22ff22
              #bg_opa: COVER              

        # Wi-Fi status
        - label:
            id: wifi_status
            align: BOTTOM_MID
            x: 20
            y: -30
            text: "${wifi_100}"
            text_color: 0x444444
            text_font: icons_24

        # Home Assistant status
        - label:
            id: ha_status
            align: BOTTOM_MID
            x: -20
            y: -30
            text: "${ha}"
            text_color: 0x0044ff
            text_font: icons_24
        #–ü–ĺ–ļ–į–∑–į–Ĺ–ł—Ź –°–ě2
        - label:
            id: co2_label
            align: CENTER
            x: 0
            y: 0
            text_color: 0x999999
            text_font: roboto60
            text: "----"
        - label:
            align: CENTER
            x: 100
            y: 0 #25 #10
            text_color: 0x999999
            text_font: roboto20
            text: "ppm"
        - label:
            align: CENTER
            x: -100
            y: 0 #25 #10
            text_color: 0xbb2222
            text_font: roboto24
            text: "CO2"
        - line:
