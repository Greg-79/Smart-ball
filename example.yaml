              - 120, 210
              - 240, 210
            line_width: 3
            line_color: 0xbb2222
            line_rounded: true

        #–ü–ĺ–ļ–į–∑–į–Ĺ–ł—Ź —ā–Ķ–ľ–Ņ–Ķ—Ä–į—ā—É—Ä—č
        - label:
            id: temp_label
